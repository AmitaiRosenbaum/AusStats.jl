name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    continue-on-error: ${{ matrix.allow_failure }}

    strategy:
      fail-fast: false
      matrix:
        version:
          - "1.10"
          - "1.11"
          - "1.12"
          - "1"
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        allow_failure:
          - false
        include:
          - version: "pre"
            os: ubuntu-latest
            allow_failure: true
          - version: "nightly"
            os: ubuntu-latest
            allow_failure: true

    steps:
      - uses: actions/checkout@v7

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v3

      - uses: julia-actions/julia-buildpkg@v1

      - uses: julia-actions/julia-runtest@v1
        with:
          coverage: true

      - uses: julia-actions/julia-processcoverage@v1
        if: matrix.os == 'ubuntu-latest' && matrix.version == '1.10'

      - uses: codecov/codecov-action@v7
        if: matrix.os == 'ubuntu-latest' && matrix.version == '1.10' && github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./lcov.info
          flags: julia
          name: julia-${{ github.run_id }}
          fail_ci_if_error: true
          verbose: true
