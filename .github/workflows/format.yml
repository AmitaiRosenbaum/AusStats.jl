name: Format

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

concurrency:
  group: format-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: JuliaFormatter.jl
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}

      - uses: julia-actions/setup-julia@v3
        with:
          version: "1.10"

      - uses: julia-actions/cache@v3

      - name: Instantiate quality environment
        shell: julia --color=yes --project=quality {0}
        run: |
          using Pkg
          Pkg.develop(PackageSpec(path=pwd()))
          Pkg.instantiate()

      - name: Format Julia files
        run: julia --color=yes --project=quality quality/format.jl --fix

      - name: Commit formatting changes
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: style: fix Julia formatting
