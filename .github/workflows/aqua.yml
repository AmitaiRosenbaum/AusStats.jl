name: Aqua

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: aqua-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aqua:
    name: Aqua.jl
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v3
        with:
          version: "1.10"

      - uses: julia-actions/cache@v2

      - name: Instantiate quality environment
        shell: julia --color=yes --project=quality {0}
        run: |
          using Pkg
          Pkg.develop(PackageSpec(path=pwd()))
          Pkg.instantiate()

      - name: Run Aqua.jl
        run: julia --color=yes --project=quality quality/aqua.jl
